name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install maturin pytest pytest-cov typer rich cryptography requests "qrcode[pil]" aioquic yubihsm python-pkcs11
      - name: Build and Test
        run: |
          maturin develop
          pytest
